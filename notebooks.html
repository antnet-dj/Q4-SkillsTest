<!DOCTYPE html>
<html>
<head>
    <title>Virtual Notebooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">
    <h1>NOTEBOOKS</h1>
    <p>Select a subject below.</p>

    <div class="row">

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('Filipino')">
                Filipino
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('English')">
                English
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('Math')">
                Math
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('Science')">
                Science
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('Social Studies')">
                Social Studies
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('T.L.E.')">
                T.L.E.
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('L.T.')">
                L.T.
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('P.E.')">
                P.E.
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('V.E.')">
                V.E.
            </div>
        </div>
                <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('I.C.T.')">
                I.C.T.
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('Homeroom')">
                Homeroom
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3" onclick="openSubject('Music & Arts')">
                Music & Arts
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
